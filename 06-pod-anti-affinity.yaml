apiVersion: v1
kind: Pod
metadata:
 name: pod-1
 labels:
  tier: backend
spec:
 containers:
  - name: nginx
    image: nginx
---
apiVersion: v1
kind: Pod
metadata:
 name: pod-2
 labels:
  tier: backend
spec:
 containers:
  - name: nginx
    image: nginx 
 affinity:
  podAntiAffinity:
   requiredDuringSchedulingIgnoredDuringExecution:
    - labelSelector:
       matchExpressions:
        - key: tier
          operator: In
          values:
           - backend
      topologyKey: topology.kubernetes.io/zone