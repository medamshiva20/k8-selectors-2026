apiVersion: v1
kind: Pod
metadata:
 name: pod-affinity
 labels:
  tier: backend
spec:
 containers:
  - name: nginx 
    image: nginx
---
apiVersion: v1
kind: Pod
metadata:
 name: pod-2
 labels:
  tier: backend
spec:
 containers:
  - name: nginx 
    image: nginx
 affinity:
  podAffinity:
   requiredDuringSchedulingIgnoredDuringExecution:
    - labelSelector:
       matchExpressions:
        - key: tier
          operator: In
          values:
           - database
      topologyKey: topology.kubernetes.io/zone