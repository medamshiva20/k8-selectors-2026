apiVersion: v1
kind: Pod
metadata:
 name: nginx-anti-affinity
spec:
 containers:
  - name: nginx
    image: nginx 
 affinity:
  nodeAffinity:
   requiredDuringSchedulingIgnoredDuringExecution:
    nodeSelectorTerms:
     - matchExpressions:
        - key: topology.kubernetes.io/zone
          operator: NotIn
          values:
           - us-east-1d          